name: Generate RSS Feed

on:
  push:
    branches: [main]
    paths:
      - 'blog/blog.json'
      - 'blog/posts/**'

jobs:
  generate-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate feed.xml
        run: node blog/scripts/generate-feed.js

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/feed.xml
          git diff --cached --quiet && echo "No changes" || git commit -m "Auto-update RSS feed" && git push
